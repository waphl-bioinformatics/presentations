<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1530 360"
     font-family="'Public Sans', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Sample-to-response workflow</title>
  <desc id="desc">Submitters send specimens to the wet lab (receiving and accessioning, culturing,
  sequencing). Sequencing feeds two bioinformatics analyses: de novo analysis and phylogenetic
  analysis. Phylogenetic analysis sits in an overlap between bioinformatics and interpretation, and
  both analyses feed molecular epidemiology, then traditional epidemiology, which returns results,
  alerts and guidance to submitters.</desc>

  <defs>
    <marker id="a-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0c5460"/>
    </marker>
    <marker id="a-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b4a8f"/>
    </marker>
    <marker id="a-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e48430"/>
    </marker>
    <style>
      .grp    { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
      .n-t    { font-size: 14px; font-weight: 700; }
      .n-s    { font-size: 10.5px; font-weight: 400; }
      .e-lbl  { font-size: 11px; font-weight: 600; fill: #c96a1f; }
    </style>
  </defs>

  <rect x="10" y="14" width="1510" height="332" rx="18" fill="#f7fbfb" stroke="#cfeaea" stroke-width="1"/>
  <text x="40" y="50" font-size="20" font-weight="600" fill="#0c5460">Sample-to-response workflow</text>

  <g transform="translate(29,27.5) scale(0.75)">
  <!-- Containers -->
  <rect x="250" y="70" width="682" height="144" rx="18" fill="#d8f0f0" stroke="#0c5460" stroke-width="1.5"/>
  <text x="268" y="94" class="grp" fill="#083e47">Wet Lab</text>

  <rect x="968" y="70" width="502" height="290" rx="18" fill="#e1d5ef" stroke="#6b4a8f" stroke-width="1.5"/>
  <text x="986" y="94" class="grp" fill="#4f3670">Bioinformatics</text>

  <rect x="1200" y="70" width="746" height="144" rx="18" fill="#fdeede" fill-opacity="0.72" stroke="#e48430" stroke-width="1.5"/>
  <text x="1500" y="94" class="grp" fill="#c96a1f">Epidemiology</text>

  <line x1="1470" y1="74" x2="1470" y2="210" stroke="#6b4a8f" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>

  <!-- Edges -->
  <g fill="none" stroke-linecap="round">
    <path d="M210,150 H264"  stroke="#0c5460" stroke-width="2.5" marker-end="url(#a-teal)"/>
    <path d="M460,150 H490"  stroke="#0c5460" stroke-width="2.5" marker-end="url(#a-teal)"/>
    <path d="M686,150 H716"  stroke="#0c5460" stroke-width="2.5" marker-end="url(#a-teal)"/>
    <path d="M912,150 H1234"  stroke="#0c5460" stroke-width="2.5" marker-end="url(#a-teal)"/>
    <path d="M912,176 C980,232 998,294 1046,294" stroke="#0c5460" stroke-width="2.5" marker-end="url(#a-teal)"/>
    <path d="M1430,150 H1496" stroke="#6b4a8f" stroke-width="2.5" marker-end="url(#a-purple)"/>
    <path d="M1240,300 C1400,300 1452,300 1470,256 C1486,216 1490,178 1500,153" stroke="#6b4a8f" stroke-width="2.5" marker-end="url(#a-purple)"/>
    <path d="M1690,150 H1722" stroke="#e48430" stroke-width="2.5" marker-end="url(#a-orange)"/>
    <path d="M1821,196 V360 Q1821,372 1809,372 H127 Q115,372 115,360 V198" stroke="#e48430" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#a-orange)"/>
  </g>
  <rect x="815" y="360" width="290" height="24" rx="6" fill="#ffffff"/>
  <text x="960" y="377" text-anchor="middle" class="e-lbl">results · alerts · guidance</text>

  <!-- Nodes -->
  <rect x="20" y="106" width="190" height="88" rx="14" fill="#ffffff" stroke="#083e47" stroke-width="2"/>
  <text x="115" y="144" text-anchor="middle" class="n-t" fill="#083e47">Submitters</text>
  <text x="115" y="166" text-anchor="middle" class="n-s" fill="#083e47" opacity="0.7">Hospitals · Clinics · Providers</text>

  <g fill="#ffffff" stroke="#0c5460" stroke-width="1.5">
    <rect x="270" y="106" width="190" height="88" rx="14"/>
    <rect x="496" y="106" width="190" height="88" rx="14"/>
    <rect x="722" y="106" width="190" height="88" rx="14"/>
  </g>
  <g text-anchor="middle" fill="#1c2b2b">
    <text x="365" y="140" class="n-t">Receiving &amp;</text>
    <text x="365" y="156" class="n-t">Accessioning</text>
    <text x="365" y="176" class="n-s" opacity="0.7">Intake · Triage · Metadata</text>
    <text x="591" y="148" class="n-t">Culturing</text>
    <text x="591" y="170" class="n-s" opacity="0.7">Isolation · ID · AST</text>
    <text x="817" y="148" class="n-t">Sequencing</text>
    <text x="817" y="170" class="n-s" opacity="0.7">Library prep · WGS</text>
  </g>

  <rect x="1050" y="250" width="190" height="88" rx="14" fill="#ffffff" stroke="#6b4a8f" stroke-width="1.5"/>
  <text x="1145" y="280" text-anchor="middle" class="n-t" fill="#4f3670">Sample-level</text>
  <text x="1145" y="296" text-anchor="middle" class="n-t" fill="#4f3670">Analysis</text>
  <text x="1145" y="316" text-anchor="middle" class="n-s" fill="#4f3670" opacity="0.75">Assembly · AMR genes · Genotype</text>

  <rect x="1240" y="106" width="190" height="88" rx="14" fill="#ffffff" stroke="#6b4a8f" stroke-width="2"/>
  <text x="1335" y="144" text-anchor="middle" class="n-t" fill="#4f3670">Population-level</text>
  <text x="1335" y="160" text-anchor="middle" class="n-t" fill="#4f3670">Analysis</text>
  <text x="1335" y="180" text-anchor="middle" class="n-s" fill="#4f3670" opacity="0.75">Alignment · Trees · Clustering</text>

  <g fill="#e48430" stroke="#c96a1f" stroke-width="1.5">
    <rect x="1500" y="106" width="190" height="88" rx="14"/>
    <rect x="1726" y="106" width="190" height="88" rx="14"/>
  </g>
  <g text-anchor="middle" fill="#ffffff">
    <text x="1595" y="140" class="n-t">Molecular Epi</text>
    <text x="1595" y="160" class="n-s" opacity="0.9">Phylogenetics ·</text>
    <text x="1595" y="174" class="n-s" opacity="0.9">Public health action</text>
    <text x="1821" y="140" class="n-t">Traditional Epi</text>
    <text x="1821" y="160" class="n-s" opacity="0.9">Person / Place / Time ·</text>
    <text x="1821" y="174" class="n-s" opacity="0.9">Public health action</text>
  </g>
  </g>
</svg>